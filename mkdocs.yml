site_name: ptal-gtfs
site_description: >-
  Public Transport Accessibility Levels (PTAL) for Indian cities,
  computed from GTFS and OpenStreetMap.

# TODO: replace CHANGEME with the real GitHub repo once it is pushed.
repo_url: https://github.com/CHANGEME/ptal-gtfs
repo_name: ptal-gtfs
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: deep orange
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: deep orange
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.suggest
    - content.code.copy
    - toc.follow

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          # Point griffe at the src/ layout so it can parse the package statically,
          # without installing it (or its heavy GIS dependencies) on Read the Docs.
          paths: [src]
          options:
            docstring_style: numpy
            show_source: true
            show_root_heading: true
            members_order: source
            separate_signature: true

markdown_extensions:
  - admonition
  - tables
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Install: install.md
  - Quickstart: quickstart.md
  - Guide:
      - Methodology: methodology.md
      - Architecture: architecture.md
      - Data inputs: data.md
  - API reference:
      - Overview: reference/index.md
      - GTFS loading: reference/gtfs.md
