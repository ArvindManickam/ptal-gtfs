# Default profile — reproduces the Transport for London PTAL method exactly.
# This profile is sacred: it must keep matching TfL (golden tests). Indian adaptations
# go in india.yaml or derived profiles, never here.
name: default

# Walk speed in metres per minute (methodology §1.2; TfL 80 m/min ≈ 4.8 km/h).
walk_speed_m_per_min: 80.0

# AM peak window the frequency is measured in (methodology §1.4; TfL 08:15-09:15).
peak_window: { start: "08:15", end: "09:15" }

# POI grid spacing in metres (methodology §1.1; TfL 100 m).
grid: { spacing_m: 100 }

# Maximum network walk distance to a stop per mode, metres (TfL: 8 min bus, 12 min rail
# at 80 m/min -> 640 m / 960 m).
access_m: { bus: 640, metro: 960, rail: 960, tram: 960 }

# Reliability term K added to SWT (methodology §1.4).
reliability:
  kind: static            # AWT = SWT + K
  by_mode:
    bus: 2.0              # TfL bus
    metro: 0.75           # TfL Underground
    rail: 0.75            # TfL rail
    tram: 0.75            # TfL tram

# PTAL band table (methodology §1.7).
bands:
  edges: [0.0, 2.5, 5.0, 10.0, 15.0, 20.0, 25.0, 40.0, .inf]
  labels: ["1a", "1b", "2", "3", "4", "5", "6a", "6b"]
