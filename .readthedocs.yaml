# Read the Docs build configuration.
# https://docs.readthedocs.io/en/stable/config-file/v2.html
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"

mkdocs:
  configuration: mkdocs.yml

python:
  install:
    # For now, only the docs tools are needed (no package code yet).
    - requirements: docs/requirements.txt
    # Once src/ptal_gtfs exists and the API reference uses `:::` directives,
    # also install the package so mkdocstrings can import it — replace the line
    # above (or add) the following:
    #   - method: pip
    #     path: .
    #     extra_requirements:
    #       - docs
