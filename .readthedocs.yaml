# Read the Docs build configuration.
# https://docs.readthedocs.io/en/stable/config-file/v2.html
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"

mkdocs:
  configuration: mkdocs.yml

python:
  install:
    # Only the docs tools are needed. The package itself is NOT installed here:
    # mkdocstrings reads the source statically via `paths: [src]` in mkdocs.yml, so
    # the API reference renders without pulling in the heavy GIS dependencies (and
    # without needing pandana to build on Read the Docs).
    - requirements: docs/requirements.txt
